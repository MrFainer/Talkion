services:
  postgres:
    image: postgres:15-alpine
    container_name: talkion_postgres
    environment:
      POSTGRES_USER: talkion
      POSTGRES_PASSWORD: talkionpassword
      POSTGRES_DB: talkion_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: talkion_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: talkion_evolution_api
    environment:
      - SERVER_URL=http://localhost:8080
      - DOCKER_ENV=true
      - NODE_OPTIONS=--dns-result-order=ipv4first
      - LOG_LEVEL=ERROR,WARN,INFO,LOG
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=global_api_key_talkion
      - REDIS_ENABLED=true
      - REDIS_URI=redis://redis:6379/1
      - REDIS_PREFIX_KEY=talkion_evo
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379/2
      - CACHE_LOCAL_ENABLED=true
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://talkion:talkionpassword@postgres:5432/talkion_db?schema=evolution
      - DATABASE_CONNECTION_CLIENT_NAME=evolution
      - CONFIG_SESSION_PHONE_CLIENT=Chrome
      - CONFIG_SESSION_PHONE_NAME=Talkion-Bot
      - QRCODE_LIMIT=30
    ports:
      - "8080:8080"
    volumes:
      - evolution_instances:/evolution/instances
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  evolution_instances:
